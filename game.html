<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxygen-Zero | LG Games</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* Styles spécifiques au mode lecture */
        .story-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            background: rgba(20, 27, 36, 0.5);
            border-radius: 24px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        .story-text {
            font-family: 'Merriweather', serif; /* Police de roman */
            font-size: 1.2rem;
            line-height: 1.8;
            color: #e0e6ed;
            margin-bottom: 30px;
            white-space: pre-wrap; /* Garde les sauts de ligne du roman */
        }
        .choice-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .choice-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px 25px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
        }
        .choice-btn:hover {
            background: var(--accent);
            color: var(--bg-dark);
            transform: translateX(10px);
        }
        .setup-screen {
            text-align: center;
        }
        .setup-screen input, .setup-screen select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            margin: 10px;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">LG<span>GAMES</span></div>
        <div class="game-title">OXYGEN-ZERO</div>
        <div style="width: 50px;"></div>
    </header>

    <main class="content">
        <div id="game-viewport" class="story-container">
            <div id="setup" class="setup-screen">
                <h2>Initialisation des systèmes de survie</h2>
                <p>Veuillez décliner votre identité pour le journal de bord.</p>
                <input type="text" id="playerName" placeholder="Votre Pseudo" required>
                <select id="playerSex">
                    <option value="M">Masculin</option>
                    <option value="F">Féminin</option>
                </select>
                <br><br>
                <button class="choice-btn" onclick="startGame()">Commencer l'aventure</button>
            </div>

            <div id="story-display" style="display:none;">
                <div id="text-content" class="story-text"></div>
                <div id="choices" class="choice-container"></div>
            </div>
        </div>
    </main>

    <script src="game-engine.js"></script>
</body>
</html>
