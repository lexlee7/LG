<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Stratego Hub</title>
    <style>
        body { background: #0b0f1a; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; display: flex; }
        .sidebar { background: #111827; border-right: 1px solid #1f2937; width: 280px; flex-shrink: 0; display: flex; flex-col; padding: 24px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; cursor: pointer; color: #9ca3af; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: #1f2937; color: #3b82f6; }
        .view { display: none; flex-grow: 1; overflow-y: auto; padding: 40px; }
        .view.active { display: block; }
        .card { background: #1f2937; border: 1px solid #374151; border-radius: 24px; }
    </style>
</head>
<body>

    <aside class="sidebar flex-col">
        <div class="text-xl font-extrabold tracking-tighter mb-10">STRATEGO<span class="text-blue-500">HUB</span></div>
        <nav class="flex flex-col gap-2 flex-grow">
            <div class="nav-item active" id="n-home" onclick="showPage('home')">🏠 Accueil</div>
            <div class="nav-item" onclick="openAuthModal()">👤 Profil / Connexion</div>
            <div id="admin-nav" class="nav-item text-red-400 hidden" onclick="openAdmin()">⚙️ Administration</div>
        </nav>
        <div id="user-info" class="text-[10px] font-bold text-slate-500 bg-slate-900 p-4 rounded-xl">MODE VISITEUR</div>
    </aside>

    <main class="flex-grow">
        <div id="p-home" class="view active">
            <h1 class="text-4xl font-extrabold mb-10">Simulations</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card p-8 hover:border-blue-500 transition-all cursor-pointer group" onclick="openLobby('liar')">
                    <div class="text-4xl mb-6">🎭</div>
                    <h3 class="text-xl font-bold">Liar Game</h3>
                    <p class="text-slate-400 text-sm mt-2">Dilemme social & Trahison. Gérez votre score pour atteindre 5000¥.</p>
                </div>
            </div>
        </div>

        <div id="p-lobby" class="view">
            <div class="max-w-md mx-auto card p-10 text-center">
                <h2 id="lobby-title" class="text-2xl font-bold mb-8">Lobby</h2>
                <button onclick="createRoom()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold mb-4">Créer un salon</button>
                <div class="flex gap-2">
                    <input id="room-code" type="text" placeholder="CODE" class="flex-1 bg-slate-900 border border-slate-700 p-4 rounded-2xl text-center font-bold uppercase outline-none">
                    <button onclick="joinRoom()" class="bg-slate-700 px-6 rounded-2xl font-bold">Join</button>
                </div>
                <button onclick="showPage('home')" class="mt-6 text-slate-500 text-xs font-bold uppercase">Retour</button>
            </div>
        </div>

        <div id="p-game" class="view">
            <div id="game-container"></div>
        </div>

        <div id="p-admin" class="view">
            <h2 class="text-3xl font-black mb-8 text-blue-500 italic">Tableau de Bord Administration</h2>
            <div id="stats-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10"></div>
            <div class="card overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-800/50 text-slate-500 text-[10px] font-bold uppercase">
                        <tr><th class="p-5">Joueur</th><th class="p-5">XP</th><th class="p-5">Rôle</th><th class="p-5">Action</th></tr>
                    </thead>
                    <tbody id="admin-table" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="card w-full max-w-md p-10 text-center">
            <h2 class="text-2xl font-black mb-8 italic">Identification</h2>
            <div class="space-y-4">
                <input id="a-user" type="text" placeholder="Pseudo" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none">
                <input id="a-pass" type="password" placeholder="Mot de passe" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none">
                <div class="flex gap-2">
                    <button onclick="auth('login')" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold">Login</button>
                    <button onclick="auth('guest')" class="flex-1 bg-slate-700 py-4 rounded-2xl font-bold">Invité</button>
                </div>
                <button onclick="auth('signup')" class="text-xs text-slate-500 font-bold uppercase">Créer un compte durable</button>
            </div>
            <button onclick="closeAuthModal()" class="mt-8 text-slate-600 text-[10px] block w-full">Fermer</button>
        </div>
    </div>

    <script src="games.js"></script>
    <script src="app.js"></script>
</body>
</html>
