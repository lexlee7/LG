<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Platform | Aventures Littéraires</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">LG<span>GAMES</span></div>
        <div class="search-bar">
            <input type="text" placeholder="Rechercher une aventure...">
        </div>
        <div class="user-controls">
            <button class="btn-login">Connexion</button>
            <button class="btn-signup">Inscription</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li class="active">🏠 Accueil</li>
                    <li>🚀 Science-Fiction</li>
                    <li>🏔️ Survie</li>
                    <li>☣️ Post-Apo</li>
                    <li>⌛ Mystère</li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <h1>Nouveautés Narratives</h1>
            <div class="game-grid">
                <div class="game-card" onclick="alert('Lancement de Oxygen-Zero...')">
                    <div class="badge">SF</div>
                    <div class="card-image" style="background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=400')"></div>
                    <div class="card-info">
                        <h3>Oxygen-Zero</h3>
                        <p>Seul dans le vide spatial...</p>
                    </div>
                </div>

                <div class="game-card" onclick="alert('Lancement de Zone de Mort...')">
                    <div class="badge">Survie</div>
                    <div class="card-image" style="background-image: url('https://images.unsplash.com/photo-1522163182402-834f871fd851?q=80&w=400')"></div>
                    <div class="card-info">
                        <h3>Zone de Mort</h3>
                        <p>L'Everest ne pardonne pas.</p>
                    </div>
                </div>

                <div class="game-card">
                    <div class="badge">Aventure</div>
                    <div class="card-image" style="background-image: url('https://images.unsplash.com/photo-1559128010-7c1ad6e1b6a5?q=80&w=400')"></div>
                    <div class="card-info">
                        <h3>L'Atoll Blanc</h3>
                        <p>L'île s'enfonce chaque jour.</p>
                    </div>
                </div>

                </div>
        </main>
    </div>

</body>
</html>
