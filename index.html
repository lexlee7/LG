<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <title>Liar Game Online</title>
</head>
<body class="bg-zinc-950 text-white flex flex-col items-center justify-center min-h-screen p-4">
    <div id="setup" class="border-2 border-red-600 p-8 rounded-lg shadow-[0_0_20px_rgba(220,38,38,0.5)]">
        <h1 class="text-2xl font-black mb-4 tracking-tighter">LIAR GAME TERMINAL</h1>
        <input id="nameInput" type="text" placeholder="VOTRE NOM" class="bg-transparent border-b border-red-600 w-full mb-4 p-2 outline-none">
        <button onclick="start()" class="w-full bg-red-600 py-2 font-bold hover:bg-red-700 transition">INITIALISER</button>
    </div>

    <div id="game" class="hidden w-full max-w-md">
        <div class="flex justify-between mb-8 border-b border-zinc-800 pb-2">
            <span id="myName" class="font-bold text-red-500 text-xl"></span>
            <span class="text-zinc-500">CREDITS: 1,000¥</span>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="vote('cooperate')" class="h-32 border border-green-500 text-green-500 font-bold rounded-xl hover:bg-green-500/10 uppercase">Coopérer</button>
            <button onclick="vote('betray')" class="h-32 border border-red-500 text-red-500 font-bold rounded-xl hover:bg-red-500/10 uppercase">Trahir</button>
        </div>
    </div>

    <script>
        // REMPLACE CETTE URL PAR TON URL RENDER PLUS TARD
        const socket = io('https://lg-3f7p.onrender.com'); 

        function start() {
            const name = document.getElementById('nameInput').value;
            if(!name) return;
            socket.emit('join', name);
            document.getElementById('myName').innerText = name;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
        }

        function vote(type) {
            socket.emit('vote', type);
            alert("Action enregistrée. Attente des autres joueurs...");
        }
    </script>
</body>
</html>
