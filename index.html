<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <title>LIAR GAME TERMINAL</title>
    <style>
        body { background-color: #050505; color: #d1d1d1; font-family: 'Courier New', monospace; overflow-x: hidden; }
        .neon-red { border: 1px solid #ff003c; box-shadow: 0 0 20px rgba(255, 0, 60, 0.2); }
        .glitch { animation: flash 0.3s; }
        @keyframes flash { 0% { background: #450a0a; } 100% { background: #050505; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="login" class="w-full max-w-sm p-8 bg-black neon-red rounded-lg text-center">
        <h1 class="text-3xl font-black text-red-600 mb-6 tracking-tighter uppercase italic">Liar Game</h1>
        <input id="nameInput" type="text" placeholder="IDENTIFIANT" class="bg-zinc-900 border border-zinc-800 p-3 mb-4 w-full text-center outline-none focus:border-red-600 text-red-500 font-bold uppercase">
        <button onclick="connectPlayer()" class="w-full bg-red-800 hover:bg-red-600 text-white py-3 font-bold transition-all uppercase">Initialiser</button>
    </div>

    <div id="game" class="hidden w-full max-w-5xl grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="md:col-span-1 bg-zinc-950 p-4 border border-zinc-800 rounded">
            <h2 class="text-red-600 text-[10px] font-bold mb-4 uppercase tracking-widest border-b border-red-900/30 pb-2 text-center">Moniteur de Crédit</h2>
            <div id="playerList" class="space-y-3"></div>
        </div>

        <div class="md:col-span-3 space-y-6">
            <div id="main-screen" class="bg-black p-8 neon-red rounded relative min-h-[350px] flex flex-col justify-center text-center">
                <div id="status-text" class="text-[10px] text-red-500 mb-2 uppercase italic tracking-tighter font-bold">Liaison établie...</div>
                
                <div id="play-zone">
                    <h3 class="text-xl font-bold mb-8 text-white uppercase leading-tight tracking-tight">Phase de décision : Allez-vous Coopérer ou Trahir ?</h3>
                    <div id="actions" class="flex gap-4">
                        <button onclick="sendVote('cooperate')" class="flex-1 border-2 border-green-600 p-6 rounded font-black text-green-600 hover:bg-green-600/10 transition uppercase">Coopérer</button>
                        <button onclick="sendVote('betray')" class="flex-1 border-2 border-red-600 p-6 rounded font-black text-red-600 hover:bg-red-600/10 transition uppercase">Trahir</button>
                    </div>
                </div>

                <div id="end-zone" class="hidden">
                    <h2 id="end-title" class="text-4xl font-black text-red-600 mb-4 tracking-widest">GAME OVER</h2>
                    <p id="end-msg" class="text-zinc-400 mb-8 text-sm uppercase"></p>
                    <button onclick="location.reload()" class="bg-red-800 px-10 py-4 font-black text-xs hover:bg-red-600 transition tracking-widest uppercase">Redémarrer Terminal</button>
                </div>
            </div>
            <div id="log" class="h-32 bg-black border border-zinc-900 p-4 text-[10px] text-zinc-600 overflow-y-auto font-mono"></div>
        </div>
    </div>

    <script>
        const socket = io('https://lg-3f7p.onrender.com', { transports: ['websocket', 'polling'] }); 
        let isDead = false;

        function connectPlayer() {
            const name = document.getElementById('nameInput').value;
            if(!name) return;
            socket.emit('join', name);
            document.getElementById('login').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
        }

        function sendVote(type) {
            if(isDead) return;
            socket.emit('vote', type);
            document.getElementById('actions').style.pointerEvents = 'none';
            document.getElementById('actions').style.opacity = '0.3';
            document.getElementById('status-text').innerText = "VOTE TRANSMIS. ANALYSE DU RÉSEAU...";
        }

        function updatePlayers(players) {
            const list = document.getElementById('playerList');
            list.innerHTML = players.map(p => `
                <div class="flex justify-between items-center bg-zinc-900/30 p-2 border ${p.alive ? 'border-zinc-800' : 'border-red-600 bg-red-950/20'} rounded">
                    <div class="flex flex-col">
                        <span class="text-xs ${p.alive ? 'text-zinc-400' : 'text-red-500 font-bold'}">${p.name} ${p.alive ? '' : '[OUT]'}</span>
                        <span class="text-[8px] text-zinc-600 uppercase font-bold">${p.status}</span>
                    </div>
                    <span class="text-red-600 font-bold">${p.score.toLocaleString()}¥</span>
                </div>
            `).join('');

            const me = players.find(p => p.id === socket.id);
            if (me && !me.alive && !isDead) {
                isDead = true;
                showGameOver("Vous avez fait banqueroute. Votre dette a été vendue.");
            }
        }

        socket.on('update_players', (players) => updatePlayers(players));

        socket.on('results', (data) => {
            document.body.classList.add('glitch');
            setTimeout(() => document.body.classList.remove('glitch'), 300);
            
            updatePlayers(data.players);

            addLog("--- RAPPORT FINANCIER ---");
            data.report.forEach(r => {
                const color = r.diff >= 0 ? 'text-green-500' : 'text-red-500';
                addLog(`${r.name} [${r.vote.toUpperCase()}] : <span class="${color}">${r.diff}¥</span>`);
            });

            if (data.winner) {
                showGameOver(`Le tournoi est terminé. Gagnant : ${data.winner}`, "VICTOIRE");
            } else if (!isDead) {
                document.getElementById('actions').style.pointerEvents = 'auto';
                document.getElementById('actions').style.opacity = '1';
                document.getElementById('status-text').innerText = "NOUVEAU ROUND DISPONIBLE.";
            }
        });

        function showGameOver(msg, title = "GAME OVER") {
            document.getElementById('play-zone').classList.add('hidden');
            document.getElementById('end-zone').classList.remove('hidden');
            document.getElementById('end-title').innerText = title;
            document.getElementById('end-msg').innerText = msg;
            document.getElementById('status-text').innerText = "TERMINAL DÉCONNECTÉ.";
        }

        function addLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `<div class="mb-1">> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
