<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LG SYSTEMS | Interface</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Merriweather:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="location.reload()">LG<span>SYSTEMS</span></div>
        <div style="font-size: 0.7rem; color: var(--accent); letter-spacing: 2px;">CONNECTION_ACTIVE</div>
    </header>
    
    <div class="main-container">
        <aside class="sidebar">
            <p style="font-size:0.6rem; color:#555; font-weight:bold; margin-bottom:15px; letter-spacing:1px;">MAIN_MENU</p>
            <ul style="padding:0; margin:0;">
                <li class="active" onclick="location.reload()">🏠 Bibliothèque</li>
            </ul>
            <p style="font-size:0.6rem; color:#555; font-weight:bold; margin:30px 0 15px 0; letter-spacing:1px;">MISSIONS</p>
            <ul style="padding:0; margin:0;">
                <li onclick="loadGame('oxygen-zero')">🚀 Oxygen Zero</li>
                <li onclick="loadGame('zone-de-mort')">🏔️ Zone de Mort</li>
            </ul>
        </aside>

        <main class="content">
            <div id="home-view">
                <h1 style="margin:0 0 30px 0; font-weight:900; font-size:2.5rem;">UNITÉS DE SIMULATION</h1>
                <div class="game-grid">
                    <div class="game-card" onclick="loadGame('oxygen-zero')">
                        <div class="card-img" style="background-image:url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=600')"></div>
                        <div class="card-body">
                            <h3>OXYGEN ZERO</h3>
                            <p>Survie orbitale à bord de l'Icare-7.</p>
                        </div>
                    </div>
                    <div class="game-card" onclick="loadGame('zone-de-mort')">
                        <div class="card-img" style="background-image:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600')"></div>
                        <div class="card-body">
                            <h3>ZONE DE MORT</h3>
                            <p>Ascension critique de l'Everest.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="game-view" style="display:none;">
                <div class="story-container">
                    <div id="setup">
                        <h2 id="game-title" style="font-weight:900; font-size:2rem; color:var(--accent); margin-bottom:20px;">NOM_MISSION</h2>
                        <div style="background: rgba(255,255,255,0.02); padding:30px; border-radius:15px; border:1px solid rgba(255,255,255,0.05);">
                            <input type="text" id="pName" placeholder="Identifiant" style="width:100%; padding:15px; border-radius:10px; border:1px solid #333; background:#000; color:#fff; margin-bottom:15px; outline:none;">
                            <select id="pSex" style="width:100%; padding:15px; border-radius:10px; border:1px solid #333; background:#000; color:#fff; outline:none;">
                                <option value="un homme">MODALITÉ : MASCULIN</option>
                                <option value="une femme">MODALITÉ : FÉMININ</option>
                            </select>
                            <button class="launch-btn" onclick="startGame()">LANCER</button>
                        </div>
                    </div>
                    <div id="display" style="display:none;">
                        <div id="text"></div>
                        <div id="choices"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="game-engine.js"></script>
</body>
</html>
