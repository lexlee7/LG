<body class="bg-slate-950 text-white font-sans selection:bg-red-500">
    <div id="game-container" class="max-w-2xl mx-auto min-h-screen flex flex-col justify-center p-6">
        
        <div id="stats" class="hidden flex justify-between mb-8 p-4 bg-slate-900 rounded-2xl border border-white/5 font-mono text-xs">
            <div class="text-red-400">SANTÉ: <span id="stat-health">100</span>%</div>
            <div class="text-blue-400">EAU: <span id="stat-water">3</span></div>
            <div class="text-orange-400">JOUR: <span id="stat-day">1</span></div>
        </div>

        <div id="story-card" class="card bg-slate-900 p-8 rounded-3xl border border-white/10 shadow-2xl">
            <div id="setup-view">
                <h1 class="text-4xl font-black italic mb-6">DERNIÈRES <span class="text-red-600">60s</span></h1>
                <p class="text-slate-400 mb-8">Le bunker est prêt. Vous avez 60 secondes pour choisir vos fournitures avant que les portes ne se scellent à jamais.</p>
                <input id="username" type="text" placeholder="Nom du survivant" class="w-full p-4 bg-slate-800 rounded-xl mb-4 border border-white/5">
                <button onclick="startGame()" class="w-full bg-red-600 hover:bg-red-500 p-5 rounded-2xl font-bold uppercase tracking-widest transition-all">Commencer l'aventure</button>
            </div>

            <div id="event-view" class="hidden">
                <div id="timer" class="text-5xl font-black text-red-600 mb-6 font-mono">60</div>
                <h2 id="event-title" class="text-2xl font-bold mb-4 italic">Un bruit à la porte...</h2>
                <p id="event-desc" class="text-slate-400 mb-8 leading-relaxed">Quelqu'un frappe violemment. La radio grésille. Allez-vous ouvrir ?</p>
                <div id="choices" class="grid gap-3">
                    </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="client.js"></script>
</body>
