<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Hub | Gaming Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { border-color: #10b981; transform: translateY(-5px); }
        .sidebar-item { border-left: 3px solid transparent; transition: all 0.2s; }
        .sidebar-item.active { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .game-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .game-card:hover .game-img { transform: scale(1.1); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <nav class="h-12 bg-slate-950 border-b border-white/5 flex items-center justify-between px-6 text-[10px] font-bold uppercase tracking-widest text-slate-500">
        <div class="flex gap-6">
            <a href="#" class="hover:text-emerald-500 transition-colors">Conditions d'utilisation</a>
            <a href="#" class="hover:text-emerald-500 transition-colors">Confidentialité</a>
            <a href="#" class="hover:text-emerald-500 transition-colors">Support</a>
        </div>
        <div class="flex gap-4 items-center">
            <span class="text-emerald-500/50">Version 4.2.0 (Stable)</span>
        </div>
    </nav>

    <header class="h-20 bg-[#020617]/90 border-b border-white/5 flex items-center justify-between px-8 sticky top-0 z-50 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 emerald-gradient rounded-xl flex items-center justify-center font-black text-white shadow-lg shadow-emerald-500/20">E.</div>
            <span class="font-extrabold text-xl tracking-tight">EMERALD<span class="text-emerald-500">HUB</span></span>
        </div>
        <div class="flex items-center gap-4">
            <div id="user-pill" class="hidden bg-emerald-500/10 border border-emerald-500/20 px-4 py-2 rounded-full text-xs font-bold text-emerald-400">
                <span id="nav-user"></span>
            </div>
            <button onclick="location.reload()" class="bg-white/5 p-2 rounded-lg hover:bg-white/10">🏠</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-slate-950/50 border-r border-white/5 hidden lg:flex flex-col p-4">
            <div class="space-y-1">
                <p class="text-[10px] font-black text-slate-600 uppercase px-4 mb-4 mt-2">Navigation</p>
                <button class="sidebar-item active w-full text-left p-4 rounded-xl flex items-center gap-3 font-bold text-sm">
                    <span>🎮</span> Tous les Jeux
                </button>
                <button class="sidebar-item w-full text-left p-4 rounded-xl flex items-center gap-3 font-bold text-sm text-slate-400 hover:bg-white/5">
                    <span>🔥</span> Tendances
                </button>
                <button class="sidebar-item w-full text-left p-4 rounded-xl flex items-center gap-3 font-bold text-sm text-slate-400 hover:bg-white/5">
                    <span>🏆</span> Classement
                </button>
                <div class="h-px bg-white/5 my-4"></div>
                <p class="text-[10px] font-black text-slate-600 uppercase px-4 mb-4">Catégories</p>
                <button class="sidebar-item w-full text-left p-4 rounded-xl flex items-center gap-3 font-bold text-sm text-slate-400 hover:bg-white/5">
                    <span>☢️</span> Survie
                </button>
                <button class="sidebar-item w-full text-left p-4 rounded-xl flex items-center gap-3 font-bold text-sm text-slate-400 hover:bg-white/5">
                    <span>🧩</span> Puzzle
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 bg-[#020617]">
            
            <section id="view-browser" class="max-w-6xl mx-auto">
                <h1 class="text-4xl font-black mb-8 italic uppercase tracking-tighter">Exploration</h1>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                    
                    <div onclick="Portal.selectGame('60s')" class="game-card glass-card rounded-[2.5rem] overflow-hidden cursor-pointer group">
                        <div class="h-56 overflow-hidden relative border-b border-white/5">
                            <img src="https://images.unsplash.com/photo-1533240332313-0db36245e4f3?q=80&w=800&auto=format&fit=crop" class="game-img" alt="Survival">
                            <div class="absolute inset-0 bg-emerald-950/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <span class="bg-emerald-500 text-white px-6 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-xl">Jouer maintenant</span>
                            </div>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Aventure / Solo</span>
                                <span class="text-[10px] font-mono text-slate-500">v1.2</span>
                            </div>
                            <h3 class="text-xl font-bold uppercase tracking-tight">Dernières 60s</h3>
                        </div>
                    </div>

                    <div class="glass-card rounded-[2.5rem] overflow-hidden opacity-30 grayscale cursor-not-allowed">
                        <div class="h-56 bg-slate-900 flex items-center justify-center border-b border-white/5 italic font-black text-white/5 uppercase">
                            Locked
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold uppercase tracking-tight text-slate-600">Expansion à venir</h3>
                        </div>
                    </div>

                </div>
            </section>

            <section id="view-auth" class="hidden flex items-center justify-center min-h-[60vh]">
                <div class="w-full max-w-sm glass-card p-10 rounded-[3rem] text-center">
                    <h2 class="text-2xl font-black mb-8 uppercase tracking-widest">Accès Prioritaire</h2>
                    <input id="in-user" type="text" placeholder="Pseudo" class="w-full p-5 rounded-2xl bg-slate-950 border border-white/10 mb-4 text-center focus:border-emerald-500 outline-none transition-all text-emerald-400 font-bold">
                    <button onclick="Portal.confirmAuth()" class="emerald-gradient w-full py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-emerald-600/20 active:scale-95 transition-all">S'identifier</button>
                    <p class="mt-6 text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-loose">Appuyez sur <span class="text-emerald-500 underline">Entrée</span> pour valider la séquence</p>
                </div>
            </section>

            <section id="view-game" class="hidden">
                <div id="game-mount" class="max-w-4xl mx-auto glass-card rounded-[3rem] p-10 lg:p-16">
                    </div>
            </section>

        </main>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="client.js"></script>
</body>
</html>
