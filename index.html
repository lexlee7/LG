<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Stratego Hub</title>
    <style>
        body { background-color: #0b0f1a; color: #f1f5f9; font-family: 'Inter', sans-serif; overflow: hidden; }
        .sidebar { background: #161d2f; transition: width 0.3s; }
        .card { background: #1e293b; border: 1px solid #334155; }
        .view { display: none; height: calc(100vh - 64px); overflow-y: auto; }
        .view.active { display: block; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; color: #94a3b8; font-size: 14px; font-weight: 600; }
        .nav-link:hover, .nav-link.active { background: #2d3545; color: #3b82f6; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-[#0b0f1a] z-50">
        <div class="font-black text-xl tracking-tighter">STRATEGO<span class="text-blue-500">HUB</span></div>
        <div id="user-tag" class="text-xs font-bold text-slate-400 bg-slate-800 px-4 py-2 rounded-full">Non connecté</div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="sidebar w-64 p-4 flex flex-col gap-2 border-r border-slate-800">
            <div class="nav-link active" onclick="showPage('home')">🏠 Accueil</div>
            <div class="nav-link" onclick="openAuthModal()">👤 Connexion / Profil</div>
            <div class="nav-link" onclick="showPage('tos')">⚖️ Conditions</div>
            <div id="admin-nav" class="nav-link text-red-500 hidden" onclick="openAdmin()">⚙️ Administration</div>
        </aside>

        <main class="flex-1 relative">
            
            <div id="p-home" class="view active p-10">
                <h2 class="text-3xl font-black mb-8">Simulations Disponibles</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="card p-8 rounded-3xl hover:border-blue-500 transition-all cursor-pointer group" onclick="prepareLiarGame()">
                        <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 mb-6 group-hover:bg-blue-600 group-hover:text-white transition-all text-2xl">🎭</div>
                        <h3 class="text-xl font-bold mb-2">Liar Game</h3>
                        <p class="text-slate-400 text-sm">Créez un salon privé et défiez vos amis au dilemme de la trahison.</p>
                    </div>
                </div>
            </div>

            <div id="p-lobby" class="view p-10">
                <div class="max-w-md mx-auto card rounded-[40px] p-10 text-center">
                    <h2 class="text-2xl font-black mb-6">Liar Game Lobby</h2>
                    <button onclick="createRoom()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold mb-4">Créer un nouveau salon</button>
                    <div class="flex gap-2">
                        <input id="room-input" type="text" placeholder="Code Salon" class="flex-1 bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none uppercase font-bold text-center">
                        <button onclick="joinRoom()" class="bg-slate-700 px-6 rounded-2xl font-bold">Rejoindre</button>
                    </div>
                </div>
            </div>

            <div id="p-game" class="view p-10">
                <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-8">
                    <div class="flex-1 card rounded-[40px] p-12 text-center flex flex-col justify-center min-h-[400px]">
                        <div id="liar-screen">
                            <div id="room-display" class="absolute top-8 left-8 text-[10px] font-black tracking-widest text-slate-500 bg-slate-800 px-3 py-1 rounded-full uppercase"></div>
                            <h3 class="text-4xl font-black mb-10">Faites votre choix</h3>
                            <div class="flex gap-4 max-w-sm mx-auto">
                                <button onclick="sendLiarVote('cooperate')" class="flex-1 bg-green-600 py-6 rounded-2xl font-bold hover:scale-105 transition-all">COOPÉRER</button>
                                <button onclick="sendLiarVote('betray')" class="flex-1 bg-red-600 py-6 rounded-2xl font-bold hover:scale-105 transition-all">TRAHIR</button>
                            </div>
                        </div>
                        <div id="liar-end" class="hidden">
                            <h2 id="liar-title" class="text-4xl font-black mb-4">FIN</h2>
                            <p id="liar-msg" class="text-slate-400 mb-8"></p>
                            <button onclick="showPage('home')" class="bg-blue-600 px-8 py-3 rounded-xl font-bold">Quitter</button>
                        </div>
                    </div>
                    <div class="w-full lg:w-72 space-y-4">
                        <div class="card rounded-2xl p-6">
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase mb-4">Membres du salon</h4>
                            <div id="liar-list" class="space-y-2"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="p-admin" class="view p-10">
                <h2 class="text-3xl font-black mb-8">Back-Office</h2>
                <div id="admin-stats" class="grid grid-cols-2 gap-4 mb-8"></div>
                <div class="card rounded-2xl overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-800 text-slate-500 text-[10px] uppercase font-bold"><tr id="admin-head"></tr></thead>
                        <tbody id="admin-table"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="card w-full max-w-md p-10 rounded-[40px] text-center">
            <h2 class="text-2xl font-black mb-8">Identification</h2>
            <div class="space-y-4">
                <input id="auth-user" type="text" placeholder="Pseudo" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none">
                <input id="auth-pass" type="password" placeholder="Mot de passe (laisser vide pour invité)" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none">
                <div class="flex gap-3">
                    <button onclick="submitAuth('login')" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold">Se connecter</button>
                    <button onclick="submitAuth('guest')" class="flex-1 bg-slate-700 py-4 rounded-2xl font-bold">Mode Invité</button>
                </div>
                <button onclick="submitAuth('signup')" class="text-xs text-slate-500 hover:text-white uppercase font-bold tracking-widest mt-4">Créer un compte durable</button>
            </div>
            <button onclick="closeAuthModal()" class="mt-8 text-slate-600 text-[10px] font-bold">ANNULER</button>
        </div>
    </div>

    <script>
        const socket = io('https://lg-3f7p.onrender.com'); 
        let currentUser = null;

        function showPage(pageId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('p-' + pageId).classList.add('active');
        }

        function openAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }

        function submitAuth(type) {
            const user = document.getElementById('auth-user').value;
            const pass = document.getElementById('auth-pass').value;
            if(!user) return alert("Pseudo requis");
            socket.emit('auth_submit', { user, pass, type });
        }

        socket.on('auth_res', (res) => {
            if(res.success) {
                currentUser = res.user;
                document.getElementById('user-tag').innerText = `👤 ${res.user} (${res.xp} XP)`;
                if(res.role === 'admin') document.getElementById('admin-nav').classList.remove('hidden');
                closeAuthModal();
            } else alert(res.msg);
        });

        // LIAR GAME FLOW
        function prepareLiarGame() {
            if(!currentUser) return openAuthModal();
            showPage('lobby');
        }

        function createRoom() { socket.emit('create_room', currentUser); }
        function joinRoom() { 
            const code = document.getElementById('room-input').value.toUpperCase();
            if(code) socket.emit('join_room', { code, username: currentUser }); 
        }

        socket.on('room_update', (data) => {
            showPage('game');
            document.getElementById('room-display').innerText = "Salon: " + data.code;
            const list = document.getElementById('liar-list');
            list.innerHTML = data.players.map(p => `
                <div class="flex justify-between p-3 rounded-xl bg-slate-800/50 text-[10px] font-bold ${p.alive ? '' : 'opacity-20'}">
                    <span>${p.name} <span class="block text-slate-500 uppercase">${p.status}</span></span>
                    <span class="text-blue-500">${p.score}¥</span>
                </div>
            `).join('');
        });

        function sendLiarVote(type) {
            socket.emit('liar_vote', type);
            document.getElementById('liar-screen').style.opacity = '0.3';
            document.getElementById('liar-screen').style.pointerEvents = 'none';
        }

        socket.on('liar_results', (data) => {
            document.getElementById('liar-screen').style.opacity = '1';
            document.getElementById('liar-screen').style.pointerEvents = 'auto';
            if(data.winner) {
                document.getElementById('liar-screen').classList.add('hidden');
                document.getElementById('liar-end').classList.remove('hidden');
                document.getElementById('liar-msg').innerText = `Le gagnant est ${data.winner}.`;
            }
        });

        // ADMIN
        function openAdmin() {
            showPage('admin');
            socket.emit('admin_get_data');
        }

        socket.on('admin_data_res', (data) => {
            document.getElementById('admin-table').innerHTML = data.users.map(u => `
                <tr class="border-b border-slate-800">
                    <td class="p-4 font-bold">${u.username}</td>
                    <td class="p-4">${u.xp} XP</td>
                    <td class="p-4">${u.role}</td>
                    <td class="p-4 text-red-500 cursor-pointer" onclick="adminAction('${u.username}', 'ban', true)">BAN</td>
                </tr>
            `).join('');
        });

        socket.on('room_error', (msg) => alert(msg));
    </script>
</body>
</html>
