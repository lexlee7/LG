<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LG SYSTEMS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Merriweather&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="location.reload()">LG<span>SYSTEMS</span></div>
    </header>
    <div class="main-container">
        <aside class="sidebar">
            <div class="nav-section"><p>MENU</p><ul><li class="active">Bibliothèque</li></ul></div>
            <div class="nav-section"><p>JEUX</p><ul><li onclick="loadGame('oxygen-zero')">Oxygen Zero</li><li onclick="loadGame('zone-de-mort')">Zone de Mort</li></ul></div>
        </aside>
        <main class="content">
            <div id="home-view">
                <h1 style="margin:0 0 30px 0; font-weight:900;">BIBLIOTHÈQUE</h1>
                <div class="game-grid">
                    <div class="game-card" onclick="loadGame('oxygen-zero')">
                        <div class="card-img" style="background-image:url('https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=400')"></div>
                        <div class="card-body"><h3>OXYGEN ZERO</h3><p>Survie orbitale critique. Gérez votre oxygène.</p></div>
                    </div>
                    <div class="game-card" onclick="loadGame('zone-de-mort')">
                        <div class="card-img" style="background-image:url('https://images.unsplash.com/photo-1522163182402-834f871fd851?w=400')"></div>
                        <div class="card-body"><h3>ZONE DE MORT</h3><p>L'ascension de l'Everest. Gérez votre chaleur.</p></div>
                    </div>
                </div>
            </div>
            <div id="game-view" style="display:none;">
                <div class="story-container">
                    <div id="setup">
                        <h2 id="game-title">JEU</h2>
                        <input type="text" id="pName" placeholder="Nom du héros" style="width:100%; padding:15px; border-radius:8px; border:1px solid #333; background:#000; color:#fff; box-sizing:border-box;">
                        <select id="pSex" style="width:100%; padding:15px; border-radius:8px; border:1px solid #333; background:#000; color:#fff; margin-top:10px;">
                            <option value="un homme">Homme</option><option value="une femme">Femme</option>
                        </select>
                        <button class="launch-btn" onclick="startGame()">LANCER</button>
                    </div>
                    <div id="display" style="display:none;">
                        <div id="text" class="story-text"></div>
                        <div id="choices"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="game-engine.js"></script>
</body>
</html>
