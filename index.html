<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Liar Game | Strategy Platform</title>
    <style>
        body { 
            background-color: #0f172a; 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .card { background: #1e293b; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .btn-primary { background: #3b82f6; transition: all 0.2s ease; }
        .btn-primary:hover:not(:disabled) { background: #2563eb; transform: translateY(-1px); }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover:not(:disabled) { background: #dc2626; transform: translateY(-1px); }
        .btn-success { background: #22c55e; }
        .btn-success:hover:not(:disabled) { background: #16a34a; transform: translateY(-1px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 md:p-8">

    <div id="login" class="w-full max-w-md p-10 card rounded-2xl text-center">
        <div class="mb-8">
            <div class="inline-block p-3 rounded-xl bg-blue-500/10 mb-4">
                <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white">Liar Game</h1>
            <p class="text-slate-400 text-sm mt-2">Plateforme de Dilemme Social v2.0</p>
        </div>
        
        <input id="nameInput" type="text" placeholder="Nom d'utilisateur" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-4 outline-none focus:border-blue-500 text-white transition-all">
        
        <button id="btnConnect" onclick="connectPlayer()" disabled class="w-full py-4 rounded-xl font-bold text-slate-500 bg-slate-800 cursor-not-allowed transition-all">
            Connexion au serveur...
        </button>
    </div>

    <div id="game" class="hidden w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-3 space-y-4">
            <div class="card rounded-2xl p-6">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-6">Participants</h2>
                <div id="playerList" class="space-y-3"></div>
            </div>
            
            <div class="card rounded-2xl p-6 bg-blue-600/5 border-blue-500/20">
                <p class="text-[10px] text-blue-400 uppercase font-bold mb-1">Objectif Victoire</p>
                <p class="text-xl font-bold text-white">5,000¥</p>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-6">
            <div class="card rounded-2xl p-10 min-h-[400px] flex flex-col justify-center relative overflow-hidden">
                <div id="status-badge" class="absolute top-6 right-8 px-3 py-1 rounded-full bg-slate-900 text-[10px] font-bold text-slate-400 uppercase border border-slate-700">
                    Session Active
                </div>

                <div id="play-zone" class="text-center">
                    <h2 class="text-sm text-blue-500 font-bold uppercase tracking-widest mb-4">Phase de décision</h2>
                    <h3 class="text-3xl font-bold text-white mb-10 max-w-2xl mx-auto">Allez-vous trahir vos alliés pour maximiser vos profits ?</h3>
                    
                    <div id="actions" class="flex flex-col sm:flex-row gap-4 max-w-md mx-auto">
                        <button onclick="sendVote('cooperate')" class="flex-1 btn-success text-white py-5 rounded-2xl font-bold shadow-lg shadow-green-900/20 uppercase">Coopérer</button>
                        <button onclick="sendVote('betray')" class="flex-1 btn-danger text-white py-5 rounded-2xl font-bold shadow-lg shadow-red-900/20 uppercase">Trahir</button>
                    </div>
                    <p id="wait-msg" class="hidden mt-6 text-slate-500 italic text-sm">Transmission sécurisée... attente des autres joueurs.</p>
                </div>

                <div id="end-zone" class="hidden text-center animate-in fade-in zoom-in duration-300">
                    <h2 id="end-title" class="text-5xl font-black text-white mb-4">FIN DE PARTIE</h2>
                    <p id="end-msg" class="text-slate-400 mb-10 text-lg"></p>
                    <button onclick="location.reload()" class="btn-primary px-10 py-4 rounded-xl font-bold text-white uppercase tracking-widest shadow-xl shadow-blue-500/20">Nouveau Tournoi</button>
                </div>
            </div>

            <div class="card rounded-2xl p-6">
                <div class="flex items-center justify-between mb-4 border-b border-slate-700 pb-4">
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Journal des Transactions</span>
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                </div>
                <div id="log" class="h-24 overflow-y-auto text-sm text-slate-400 font-medium space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io('https://lg-3f7p.onrender.com', { transports: ['websocket', 'polling'] }); 
        let isDead = false;

        socket.on('connect', () => {
            const btn = document.getElementById('btnConnect');
            btn.disabled = false;
            btn.classList.replace('bg-slate-800', 'btn-primary');
            btn.classList.replace('text-slate-500', 'text-white');
            btn.classList.remove('cursor-not-allowed');
            btn.innerText = "Rejoindre la partie";
        });

        function connectPlayer() {
            const name = document.getElementById('nameInput').value;
            if(!name) return;
            socket.emit('join', name);
            document.getElementById('login').classList.add('hidden');
            document.getElementById('game').classList.replace('hidden', 'grid');
        }

        function sendVote(type) {
            if(isDead) return;
            socket.emit('vote', type);
            document.getElementById('actions').style.display = 'none';
            document.getElementById('wait-msg').classList.remove('hidden');
        }

        function updateUI(players) {
            const list = document.getElementById('playerList');
            list.innerHTML = players.map(p => `
                <div class="flex items-center justify-between p-4 rounded-xl ${p.alive ? 'bg-slate-800/50' : 'bg-red-500/5 border border-red-500/20'}">
                    <div>
                        <p class="text-sm font-bold ${p.alive ? 'text-white' : 'text-red-400'}">${p.name}</p>
                        <p class="text-[10px] uppercase font-bold ${p.status === 'A voté' ? 'text-blue-400' : 'text-slate-500'}">${p.status}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black ${p.alive ? 'text-white' : 'text-red-500'}">${p.score.toLocaleString()}¥</p>
                    </div>
                </div>
            `).join('');

            const me = players.find(p => p.id === socket.id);
            if (me && !me.alive && !isDead) {
                isDead = true;
                showEnd("Vos fonds sont épuisés. Vous avez été retiré du tournoi.", "ÉLIMINÉ");
            }
        }

        socket.on('update_players', (players) => updateUI(players));

        socket.on('results', (data) => {
            updateUI(data.players);
            
            addLog(`--- Round terminé ---`);
            data.report.forEach(r => {
                const icon = r.diff >= 0 ? '↗' : '↘';
                addLog(`${r.name} : ${r.diff >= 0 ? '+' : ''}${r.diff}¥ (${r.vote})`);
            });

            if (data.winner) {
                showEnd(`Le tournoi a été remporté par ${data.winner}.`, "VICTOIRE");
            } else if (!isDead) {
                document.getElementById('actions').style.display = 'flex';
                document.getElementById('wait-msg').classList.add('hidden');
            }
        });

        function showEnd(msg, title) {
            document.getElementById('play-zone').classList.add('hidden');
            document.getElementById('end-zone').classList.remove('hidden');
            document.getElementById('end-title').innerText = title;
            document.getElementById('end-msg').innerText = msg;
            document.getElementById('status-badge').innerText = "Session terminée";
        }

        function addLog(msg) {
            const log = document.getElementById('log');
            const div = document.createElement('div');
            div.className = "border-l-2 border-slate-700 pl-3 py-1";
            div.innerHTML = msg;
            log.prepend(div);
        }
    </script>
</body>
</html>
