<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Hub | Gaming Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; }
        .emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover:not(.locked) { border-color: #10b981; transform: translateY(-5px); cursor: pointer; }
        .locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        .game-header-visual { height: 14rem; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0f172a; }
        .neon-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; text-align: center; letter-spacing: -0.05em; color: #10b981; text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .scanlines::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 10; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-20 bg-[#020617]/95 border-b border-white/5 flex items-center justify-between px-8 z-50 backdrop-blur-xl">
        <div class="flex items-center gap-4">
            <div class="w-11 h-11 emerald-gradient rounded-2xl flex items-center justify-center font-black text-white shadow-lg text-xl">E</div>
            <span class="font-extrabold text-2xl tracking-tighter uppercase">Emerald<span class="text-emerald-500 font-black">Hub</span></span>
        </div>
        <button onclick="Portal.showView('browser')" class="bg-slate-900 px-6 py-2 rounded-xl border border-white/10 hover:bg-emerald-600 transition-all text-xs font-bold uppercase tracking-widest">Bibliothèque</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 overflow-y-auto p-10 bg-[#020617]">
            
            <section id="view-browser" class="max-w-6xl mx-auto">
                <h1 class="text-5xl font-black italic uppercase tracking-tighter mb-10">Projets <span class="text-emerald-500">Actifs</span></h1>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    
                    <div onclick="Portal.selectGame('oxygen-zero')" class="game-card glass-card rounded-[3rem] overflow-hidden group">
                        <div class="game-header-visual scanlines bg-emerald-950/20">
                            <div class="neon-title uppercase font-black italic group-hover:scale-110 transition-transform duration-500">OXYGEN<br><span class="text-white">ZERO</span></div>
                        </div>
                        <div class="p-8">
                            <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest block mb-2">Simulation / Survie</span>
                            <h3 class="text-2xl font-black uppercase mb-2">Sol 1</h3>
                            <p class="text-slate-500 text-xs leading-relaxed">Survivez sur Mars avec des ressources limitées.</p>
                        </div>
                    </div>

                    <div class="game-card glass-card locked rounded-[3rem] overflow-hidden">
                        <div class="game-header-visual bg-slate-900">
                            <div class="text-slate-700 font-black italic text-xl uppercase">Coming Soon</div>
                        </div>
                        <div class="p-8"><h3 class="text-xl font-bold text-slate-700 uppercase">Projet Suivant</h3></div>
                    </div>

                </div>
            </section>

            <section id="view-game" class="hidden">
                <div id="game-mount" class="max-w-4xl mx-auto glass-card rounded-[4rem] p-12 lg:p-20 border-emerald-500/20 border-2">
                    </div>
            </section>

        </main>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="client.js"></script>
</body>
</html>
