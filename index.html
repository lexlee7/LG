<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Hub | Plateforme de Jeux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #eee; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-action { transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.1); }
        .btn-action:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 10px 20px -10px #dc2626; }
        .game-canvas { height: calc(100vh - 80px); }
    </style>
</head>
<body class="flex">

    <aside class="w-20 lg:w-64 bg-black border-r border-white/5 flex flex-col h-screen">
        <div class="p-6 text-2xl font-black italic text-red-600 tracking-tighter">SH.</div>
        <nav class="flex-1 px-4 space-y-2">
            <div class="p-3 glass rounded-xl text-xs font-bold text-red-500 mb-4 text-center uppercase tracking-widest">Jeux Solo</div>
            <button class="w-full text-left p-3 rounded-xl bg-white/5 border-l-4 border-red-600 font-bold text-sm">☢️ Dernières 60s</button>
            <button class="w-full text-left p-3 rounded-xl hover:bg-white/5 text-slate-500 text-sm">🔒 Bientôt...</button>
        </nav>
        <div id="user-tag" class="p-4 border-t border-white/5 text-[10px] font-mono text-slate-500 uppercase">v4.1.0-stable</div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-8 bg-black/50">
            <div class="flex items-center gap-4">
                <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Serveur Live</span>
            </div>
            <div id="xp-display" class="glass px-4 py-2 rounded-full text-xs font-bold">0 XP</div>
        </header>

        <section class="game-canvas p-6 lg:p-12 overflow-y-auto flex items-center justify-center">
            
            <div id="game-mount" class="w-full max-w-4xl glass rounded-[40px] p-8 lg:p-16 relative overflow-hidden">
                <div id="view-start" class="text-center">
                    <h1 class="text-6xl lg:text-8xl font-black italic uppercase mb-6 tracking-tighter">SURVIVE.</h1>
                    <p class="text-slate-400 text-lg mb-10 max-w-lg mx-auto">Une faille sismique a ouvert les portes de l'enfer. Vous avez 60 secondes pour sceller le bunker. Vos choix définiront votre lignée.</p>
                    <input id="player-name" type="text" placeholder="NOM DU SUJET" class="bg-white/5 border border-white/10 p-5 rounded-2xl w-full max-w-sm mb-6 text-center focus:border-red-600 outline-none transition-all">
                    <br>
                    <button onclick="Game.start()" class="btn-action bg-white text-black px-12 py-5 rounded-2xl font-black uppercase tracking-widest text-sm">Initier la séquence</button>
                </div>

                <div id="view-play" class="hidden">
                    <div class="flex justify-between items-start mb-12">
                        <div>
                            <div class="text-[10px] font-bold text-red-500 uppercase tracking-[0.3em] mb-2">État du Sujet</div>
                            <div class="flex gap-2">
                                <div id="hp-bar" class="h-1 w-20 bg-red-600"></div>
                                <div id="water-bar" class="h-1 w-20 bg-blue-500"></div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mb-1">Jour</div>
                            <div id="ui-day" class="text-4xl font-black italic">01</div>
                        </div>
                    </div>

                    <div class="min-h-[200px]">
                        <h2 id="ui-title" class="text-3xl font-bold mb-4 italic">Chargement...</h2>
                        <p id="ui-desc" class="text-slate-400 text-lg leading-relaxed mb-10"></p>
                    </div>

                    <div id="ui-choices" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="client.js"></script>
</body>
</html>
