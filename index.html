<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <title>LIAR GAME TERMINAL</title>
    <style>
        body { background-color: #050505; color: #d1d1d1; font-family: 'Courier New', monospace; }
        .neon-red { border: 1px solid #ff003c; box-shadow: 0 0 15px #ff003c; }
        .glitch { animation: flash 0.3s; }
        @keyframes flash { 0% { background: #450a0a; } 100% { background: #050505; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="login" class="w-full max-w-sm p-8 bg-black neon-red rounded-lg text-center">
        <h1 class="text-3xl font-black text-red-600 mb-6 tracking-tighter uppercase italic">Liar Game</h1>
        <div id="conn-indicator" class="text-[9px] mb-4 text-red-900 uppercase tracking-widest animate-pulse">Tentative de liaison...</div>
        <input id="nameInput" type="text" placeholder="ID UTILISATEUR" class="bg-zinc-900 border border-zinc-800 p-3 mb-4 w-full text-center outline-none focus:border-red-600 text-red-500 font-bold uppercase">
        <button id="btnConnect" onclick="connectPlayer()" class="w-full bg-zinc-800 text-zinc-500 py-3 font-bold cursor-not-allowed uppercase" disabled>Serveur Hors-Ligne</button>
    </div>

    <div id="game" class="hidden w-full max-w-5xl grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="md:col-span-1 bg-zinc-950 p-4 border border-zinc-800 rounded">
            <h2 class="text-red-600 text-[10px] font-bold mb-4 uppercase tracking-widest border-b border-red-900/30 pb-2 text-center">Moniteur</h2>
            <div id="playerList" class="space-y-3"></div>
        </div>
        <div class="md:col-span-3 space-y-6">
            <div id="main-screen" class="bg-black p-8 neon-red rounded relative min-h-[350px] flex flex-col justify-center text-center">
                <div id="status-text" class="text-[10px] text-red-500 mb-2 uppercase italic tracking-tighter">Connecté.</div>
                <div id="play-zone">
                    <h3 class="text-xl font-bold mb-8 text-white uppercase tracking-tight">Phase de décision</h3>
                    <div id="actions" class="flex gap-4">
                        <button onclick="sendVote('cooperate')" class="flex-1 border-2 border-green-600 p-6 rounded font-black text-green-600 hover:bg-green-600/10 transition uppercase">Coopérer</button>
                        <button onclick="sendVote('betray')" class="flex-1 border-2 border-red-600 p-6 rounded font-black text-red-600 hover:bg-red-600/10 transition uppercase">Trahir</button>
                    </div>
                </div>
                <div id="end-zone" class="hidden">
                    <h2 id="end-title" class="text-4xl font-black text-red-600 mb-4 uppercase">Game Over</h2>
                    <p id="end-msg" class="text-zinc-400 mb-8 text-sm italic"></p>
                    <button onclick="location.reload()" class="bg-red-800 px-10 py-4 font-black text-xs hover:bg-red-600 transition uppercase">Reboot Terminal</button>
                </div>
            </div>
            <div id="log" class="h-32 bg-black border border-zinc-900 p-4 text-[10px] text-zinc-600 overflow-y-auto font-mono"></div>
        </div>
    </div>

    <script>
        const socket = io('https://lg-3f7p.onrender.com', { 
            transports: ['websocket', 'polling'], 
            reconnection: true,
            reconnectionAttempts: Infinity
        }); 
        
        let isDead = false;

        socket.on('connect', () => {
            const btn = document.getElementById('btnConnect');
            btn.disabled = false;
            btn.classList.replace('bg-zinc-800', 'bg-red-800');
            btn.classList.replace('text-zinc-500', 'text-white');
            btn.classList.remove('cursor-not-allowed');
            btn.innerText = "S'ENREGISTRER";
            document.getElementById('conn-indicator').innerText = "Liaison Établie";
            document.getElementById('conn-indicator').classList.replace('text-red-900', 'text-green-600');
            addLog("Connecté au serveur principal.");
        });

        function connectPlayer() {
            const name = document.getElementById('nameInput').value;
            if(!name) return;
            socket.emit('join', name);
            document.getElementById('login').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
        }

        function sendVote(type) {
            if(isDead) return;
            socket.emit('vote', type);
            document.getElementById('actions').style.pointerEvents = 'none';
            document.getElementById('actions').style.opacity = '0.3';
            document.getElementById('status-text').innerText = "VOTE TRANSMIS...";
        }

        function updateUI(players) {
            const list = document.getElementById('playerList');
            list.innerHTML = players.map(p => `
                <div class="flex justify-between items-center bg-zinc-900/30 p-2 border ${p.alive ? 'border-zinc-800' : 'border-red-600 bg-red-950/20'} rounded">
                    <div class="flex flex-col">
                        <span class="text-xs ${p.alive ? 'text-zinc-400' : 'text-red-500 font-bold'}">${p.name} ${p.alive ? '' : '[OUT]'}</span>
                        <span class="text-[8px] text-zinc-600 uppercase font-bold">${p.status}</span>
                    </div>
                    <span class="text-red-600 font-bold">${p.score.toLocaleString()}¥</span>
                </div>
            `).join('');

            const me = players.find(p => p.id === socket.id);
            if (me && !me.alive && !isDead) {
                isDead = true;
                showEnd("Banqueroute détectée. Dette vendue.", "ÉLIMINÉ");
            }
        }

        socket.on('update_players', (players) => updateUI(players));

        socket.on('results', (data) => {
            document.body.classList.add('glitch');
            setTimeout(() => document.body.classList.remove('glitch'), 300);
            updateUI(data.players);
            addLog("--- ANALYSE DU ROUND ---");
            data.report.forEach(r => {
                const color = r.diff >= 0 ? 'text-green-500' : 'text-red-500';
                addLog(`${r.name} [${r.vote.toUpperCase()}] : <span class="${color}">${r.diff}¥</span>`);
            });

            if (data.winner) {
                showEnd(`Gagnant final : ${data.winner}`, "VICTOIRE");
            } else if (!isDead) {
                document.getElementById('actions').style.pointerEvents = 'auto';
                document.getElementById('actions').style.opacity = '1';
                document.getElementById('status-text').innerText = "NOUVEAU ROUND.";
            }
        });

        function showEnd(msg, title) {
            document.getElementById('play-zone').classList.add('hidden');
            document.getElementById('end-zone').classList.remove('hidden');
            document.getElementById('end-title').innerText = title;
            document.getElementById('end-msg').innerText = msg;
        }

        function addLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `<div>> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
