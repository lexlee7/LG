<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Hub | Oxygen Zero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; }
        .emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .glass-card:hover { border-color: #10b981; transform: translateY(-5px); box-shadow: 0 20px 40px -20px rgba(16, 185, 129, 0.2); }
        .sidebar-item { border-left: 3px solid transparent; transition: all 0.2s; }
        .sidebar-item.active { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .game-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .game-card:hover .game-img { transform: scale(1.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <nav class="h-10 bg-slate-950 border-b border-white/5 flex items-center justify-between px-8 text-[9px] font-bold uppercase tracking-[0.2em] text-slate-600">
        <div class="flex gap-8">
            <a href="#" class="hover:text-emerald-500 transition-colors">Conditions</a>
            <a href="#" class="hover:text-emerald-500 transition-colors">Confidentialité</a>
            <a href="#" class="hover:text-emerald-500 transition-colors">Support</a>
        </div>
        <div class="text-emerald-500/30">Build 07.04.2026_v4.2</div>
    </nav>

    <header class="h-20 bg-[#020617]/95 border-b border-white/5 flex items-center justify-between px-8 sticky top-0 z-50 backdrop-blur-xl">
        <div class="flex items-center gap-4">
            <div class="w-11 h-11 emerald-gradient rounded-2xl flex items-center justify-center font-black text-white shadow-lg text-xl">E</div>
            <span class="font-extrabold text-2xl tracking-tighter uppercase">Emerald<span class="text-emerald-500">Hub</span></span>
        </div>
        <div id="user-pill" class="hidden flex items-center gap-3 bg-white/5 border border-white/10 px-5 py-2.5 rounded-2xl text-xs font-bold text-emerald-400">
            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
            <span id="nav-user"></span>
        </div>
        <button onclick="location.reload()" class="bg-slate-900 p-3 rounded-xl border border-white/5 hover:bg-emerald-600 transition-all">🏠</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 bg-slate-950/40 border-r border-white/5 hidden lg:flex flex-col p-6">
            <div class="space-y-2">
                <p class="text-[10px] font-black text-slate-700 uppercase px-4 mb-4">Bibliothèque</p>
                <button class="sidebar-item active w-full text-left p-4 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>🌌</span> Explorer</button>
                <button class="sidebar-item w-full text-left p-4 rounded-2xl flex items-center gap-4 font-bold text-sm text-slate-500 hover:bg-white/5"><span>🔥</span> Tendances</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-10 bg-[#020617]">
            <section id="view-browser" class="max-w-6xl mx-auto">
                <h1 class="text-5xl font-black italic uppercase tracking-tighter mb-10">Expériences <span class="text-emerald-500 font-black">Solo</span></h1>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
                    
                    <div onclick="Portal.selectGame('oxygen-zero')" class="game-card glass-card rounded-[3rem] overflow-hidden cursor-pointer group">
                        <div class="h-64 overflow-hidden relative border-b border-white/5 bg-slate-900">
                            
                            <img src="./oxygen-zero.jpg" 
                                 onerror="this.src='https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?q=80&w=800&auto=format&fit=crop'" 
                                 class="game-img" 
                                 alt="Oxygen Zero">
                            
                            <div class="absolute inset-0 bg-emerald-950/60 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center backdrop-blur-sm">
                                <span class="bg-white text-black px-10 py-4 rounded-full font-black text-xs uppercase tracking-widest shadow-2xl">Lancer la mission</span>
                            </div>
                        </div>
                        <div class="p-8">
                            <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest block mb-2 font-mono">Ink-Punk / Survie</span>
                            <h3 class="text-2xl font-black uppercase tracking-tight mb-2">OXYGEN <span class="text-emerald-500 italic">ZERO</span></h3>
                            <p class="text-slate-500 text-xs leading-relaxed">Réserves critiques. Tempête imminente. Survivrez-vous au Sol 1 ?</p>
                        </div>
                    </div>

                </div>
            </section>

            <section id="view-auth" class="hidden flex items-center justify-center min-h-[60vh]">
                <div class="w-full max-w-sm glass-card p-12 rounded-[4rem] text-center">
                    <h2 class="text-2xl font-black mb-8 uppercase tracking-widest italic">Identification</h2>
                    <input id="in-user" type="text" placeholder="Pseudo" class="w-full p-6 rounded-2xl bg-slate-950 border border-white/5 mb-4 text-center focus:border-emerald-500 outline-none text-emerald-400 font-bold uppercase tracking-widest">
                    <button onclick="Portal.confirmAuth()" class="emerald-gradient w-full py-6 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-emerald-600/30">Accéder</button>
                    <p class="mt-8 text-[9px] text-slate-600 font-bold uppercase tracking-widest">Appuyez sur <span class="text-emerald-500 underline">Entrée</span></p>
                </div>
            </section>

            <section id="view-game" class="hidden">
                <div id="game-mount" class="max-w-4xl mx-auto glass-card rounded-[4rem] p-12 lg:p-20 shadow-2xl shadow-emerald-500/10 border-emerald-500/20 border">
                </div>
            </section>
        </main>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="client.js"></script>
</body>
</html>
