<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <title>LIAR GAME TERMINAL</title>
    <style>
        body { background-color: #050505; color: #d1d1d1; font-family: 'Courier New', monospace; }
        .neon-red { border: 1px solid #ff003c; box-shadow: 0 0 15px #ff003c; }
        .glitch { animation: flash 0.3s; }
        @keyframes flash { 0% { background: #450a0a; } 100% { background: #050505; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="login" class="w-full max-w-sm p-8 bg-black neon-red rounded-lg text-center">
        <h1 class="text-3xl font-black text-red-600 mb-6 tracking-tighter italic">LIAR GAME v1.2</h1>
        <input id="nameInput" type="text" placeholder="LOGIN" class="bg-zinc-900 border border-zinc-800 p-3 mb-4 w-full text-center outline-none focus:border-red-600 text-red-500">
        <button onclick="connectPlayer()" class="w-full bg-red-800 hover:bg-red-600 text-white py-3 font-bold">START</button>
    </div>

    <div id="game" class="hidden w-full max-w-5xl grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="md:col-span-1 bg-zinc-950 p-4 border border-zinc-800 rounded">
            <h2 class="text-red-600 text-[10px] font-bold mb-4 uppercase tracking-widest border-b border-red-900/30 pb-2">Joueurs</h2>
            <div id="playerList" class="space-y-3"></div>
        </div>

        <div class="md:col-span-3 space-y-6">
            <div id="main-screen" class="bg-black p-8 neon-red rounded relative min-h-[300px] flex flex-col justify-center">
                <div id="status" class="text-[10px] text-red-500 mb-2 uppercase tracking-tighter">En attente de la phase de vote...</div>
                <h3 id="display-text" class="text-xl font-bold mb-8 text-white uppercase">Voulez-vous Coopérer ou Trahir ?</h3>
                
                <div id="actions" class="flex gap-4">
                    <button onclick="sendVote('cooperate')" class="flex-1 border-2 border-green-600 p-6 rounded font-black text-green-600 hover:bg-green-600/10 transition">COOPÉRER</button>
                    <button onclick="sendVote('betray')" class="flex-1 border-2 border-red-600 p-6 rounded font-black text-red-600 hover:bg-red-600/10 transition">TRAHIR</button>
                </div>
            </div>

            <div id="log" class="h-32 bg-black border border-zinc-900 p-4 text-[10px] text-zinc-600 overflow-y-auto font-mono"></div>
        </div>
    </div>

    <script>
        const socket = io('https://lg-3f7p.onrender.com', { transports: ['websocket', 'polling'] }); 

        function connectPlayer() {
            const name = document.getElementById('nameInput').value;
            if(!name) return;
            socket.emit('join', name);
            document.getElementById('login').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
        }

        function sendVote(type) {
            socket.emit('vote', type);
            document.getElementById('actions').classList.add('opacity-20', 'pointer-events-none');
            document.getElementById('status').innerText = "VOTE ENREGISTRÉ. ATTENTE DES AUTRES...";
        }

        socket.on('update_players', (players) => {
            const list = document.getElementById('playerList');
            list.innerHTML = players.map(p => `
                <div class="flex justify-between items-center bg-zinc-900/30 p-2 border border-zinc-800 rounded">
                    <span class="text-xs ${p.status === 'A VOTÉ' ? 'text-yellow-500 font-bold' : 'text-zinc-400'}">${p.name}</span>
                    <span class="text-red-600 font-bold">${p.score}¥</span>
                </div>
            `).join('');
        });

        socket.on('results', (data) => {
            document.body.classList.add('glitch');
            setTimeout(() => document.body.classList.remove('glitch'), 300);

            // Affichage des résultats dans le log
            addLog("--- FIN DE MANCHE ---");
            data.report.forEach(r => {
                const color = r.diff >= 0 ? 'text-green-500' : 'text-red-500';
                addLog(`${r.name} a choisi [${r.vote.toUpperCase()}] : <span class="${color}">${r.diff}¥</span>`);
            });

            // Reset de l'interface pour le round suivant
            document.getElementById('actions').classList.remove('opacity-20', 'pointer-events-none');
            document.getElementById('status').innerText = "NOUVEAU ROUND DISPONIBLE.";
        });

        function addLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `<div class="mb-1">> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        socket.on('connect', () => addLog("Système Liar Game opérationnel."));
    </script>
</body>
</html>
